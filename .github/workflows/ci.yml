name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: |
          python -m py_compile bin/dustlord scripts/dustlord_say.py scripts/dustlord_watch.py
      - name: Voice library tests
        run: |
          python -m pip install pytest
          pytest -q
